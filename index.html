<!DOCTYPE html>

<meta charset="UTF-8">
<title>x_x</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background: radial-gradient(circle at top, #0a0a0a, #000);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Rajdhani', sans-serif;
overflow:hidden;
}

/* SNOW */
#snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}

/* ENTER */
#enter-screen{
text-align:center;
opacity:1;
transition:opacity 1.2s ease;
z-index:3;
position:relative;
}

.title{
font-size:32px;
letter-spacing:6px;
margin-bottom:30px;
text-shadow:0 0 15px rgba(255,255,255,0.2);
}

.enter-btn{
border:1px solid rgba(255,255,255,0.2);
padding:10px 28px;
cursor:pointer;
letter-spacing:3px;
font-size:13px;
text-transform:lowercase;
background: rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
border-radius:10px;
transition:0.3s;
}

.enter-btn:hover{
background:white;
color:black;
}

/* PROFILE GRID */
#profile-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:grid;
grid-template-columns: repeat(auto-fit, minmax(240px, 240px));
justify-content:center;
align-content:center;
gap:40px;
opacity:0;
transition:opacity 1.2s ease;
pointer-events:none;
z-index:3;
padding:40px;
}

/* GLASS CARD */
.profile{
display:flex;
flex-direction:column;
justify-content:space-between;

height:380px;

background: rgba(255,255,255,0.05);
backdrop-filter: blur(14px);
border:1px solid rgba(255,255,255,0.15);

border-radius:18px;
padding:25px;
width:240px;

transition:0.3s;
box-shadow:0 0 20px rgba(255,255,255,0.05);
}

.profile:hover{
transform:translateY(-6px) scale(1.05);
box-shadow:0 0 35px rgba(255,255,255,0.15);
}

.profile-top{
display:flex;
flex-direction:column;
align-items:center;
}

.profile img{
width:150px;
height:150px;
border-radius:50%;
margin-bottom:14px;
object-fit:cover;
border:2px solid rgba(255,255,255,0.2);
}

.no-pfp{
width:150px;
height:150px;
border-radius:50%;
border:2px solid rgba(255,255,255,0.2);
margin-bottom:14px;
}

.name{
font-size:20px;
letter-spacing:2px;
min-height:24px;
text-align:center;
}

.handle{
font-size:14px;
opacity:0.6;
margin-top:6px;
margin-bottom:10px;
letter-spacing:1px;
text-align:center;
}

/* BUTTONS */
.buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-top:auto;
}

.profile-btn{
border:1px solid rgba(255,255,255,0.2);
padding:6px 16px;
cursor:pointer;
letter-spacing:2px;
font-size:12px;
text-transform:lowercase;
text-decoration:none;
color:white;
background: rgba(255,255,255,0.05);
backdrop-filter: blur(8px);
border-radius:8px;
transition:0.25s;
}

.profile-btn:hover{
background:white;
color:black;
}
</style>

<script>
let audioStarted = false;

function enterSite(){
  const enter = document.getElementById("enter-screen");
  const profiles = document.getElementById("profile-screen");

  enter.style.opacity = "0";

  setTimeout(()=>{
    enter.style.display = "none";
    profiles.style.opacity = "1";
    profiles.style.pointerEvents = "auto";
  },1000);

  startMusic();
  startTyping();
}

let bgAudio;

function startMusic(){
  if(audioStarted) return;

  bgAudio = new Audio("media/song.mp3");
  bgAudio.loop = true;
  bgAudio.volume = 0.7;

  bgAudio.play().then(()=>{
    audioStarted = true;
  }).catch(()=>{
    document.addEventListener("click", () => {
      bgAudio.play();
      audioStarted = true;
    }, { once: true });
  });
}

function typeWriter(el,text,speed=65){
  let i=0;
  function type(){
    if(i<text.length){
      el.innerHTML+=text.charAt(i);
      i++;
      setTimeout(type,speed);
    }
  }
  type();
}

function startTyping(){
  document.querySelectorAll(".name").forEach(el=>{
    typeWriter(el,el.dataset.name);
  });
}

const canvas = document.getElementById("snow");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const isMobile = window.innerWidth < 768;
const FLAKE_COUNT = isMobile ? 120 : 220;

let snowflakes = [];

function createSnowflakes(){
  snowflakes = [];
  for(let i=0;i<FLAKE_COUNT;i++){
    snowflakes.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      size: Math.random()*1.2 + 0.3,
      speedY: Math.random()*0.6 + 0.2,
      speedX: Math.random()*0.3 - 0.15,
      opacity: Math.random()*0.5 + 0.2
    });
  }
}

createSnowflakes();

function drawSnow(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let flake of snowflakes){
    ctx.beginPath();
    ctx.arc(flake.x, flake.y, flake.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${flake.opacity})`;
    ctx.fill();

    flake.y += flake.speedY;
    flake.x += flake.speedX;
    flake.x += Math.sin(flake.y * 0.01) * 0.2;

    if(flake.y > canvas.height){
      flake.y = -5;
      flake.x = Math.random()*canvas.width;
    }

    if(flake.x > canvas.width) flake.x = 0;
    if(flake.x < 0) flake.x = canvas.width;
  }

  requestAnimationFrame(drawSnow);
}

drawSnow();
</script>
