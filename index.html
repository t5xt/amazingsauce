<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>x_x</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background: radial-gradient(circle at top, #0a0a0a, #000);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Rajdhani', sans-serif;
overflow:hidden;
}

/* SNOW */
#snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}

/* ENTER */
#enter-screen{
text-align:center;
opacity:1;
transition:opacity 1.2s ease;
z-index:3;
position:relative;
}

.title{
font-size:32px;
letter-spacing:6px;
margin-bottom:30px;
text-shadow:0 0 15px rgba(255,255,255,0.2);
}

.enter-btn{
border:1px solid rgba(255,255,255,0.2);
padding:10px 28px;
cursor:pointer;
letter-spacing:3px;
font-size:13px;
text-transform:lowercase;
background: rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
border-radius:10px;
transition:0.3s;
}

.enter-btn:hover{
background:white;
color:black;
}

/* PROFILE SCREEN (VERTICAL + EFFECTS) */
#profile-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

display:flex;
flex-direction:column;
align-items:center;
gap:20px;

overflow-y:auto;
overflow-x:hidden;

padding:80px 20px;

opacity:0;
transition:opacity 1.2s ease;
pointer-events:none;
z-index:3;

scroll-behavior:smooth;
scroll-snap-type:y mandatory;
}

/* fade overlay */
#profile-screen::before,
#profile-screen::after{
content:"";
position:fixed;
left:0;
width:100%;
height:120px;
pointer-events:none;
z-index:5;
}

#profile-screen::before{
top:0;
background:linear-gradient(to bottom, #000, transparent);
}

#profile-screen::after{
bottom:0;
background:linear-gradient(to top, #000, transparent);
}

/* hide scrollbar */
#profile-screen::-webkit-scrollbar{
display:none;
}

/* PROFILE CARD */
.profile{
width:200px;
height:300px;

display:flex;
flex-direction:column;
justify-content:space-between;

background: rgba(255,255,255,0.05);
backdrop-filter: blur(14px);
border:1px solid rgba(255,255,255,0.15);

border-radius:18px;
padding:18px;

transition:0.4s ease;
box-shadow:0 0 20px rgba(255,255,255,0.05);

opacity:0.3;
transform:scale(0.85);

scroll-snap-align:center;
transform-style:preserve-3d;
}

/* hover still works */
.profile:hover{
transform:scale(1.05);
box-shadow:0 0 35px rgba(255,255,255,0.15);
}

.profile-top{
display:flex;
flex-direction:column;
align-items:center;
}

.profile img{
width:100px;
height:100px;
border-radius:50%;
margin-bottom:12px;
object-fit:cover;
border:2px solid rgba(255,255,255,0.2);
}

.name{
font-size:18px;
letter-spacing:2px;
text-align:center;
}

.bio{
font-size:12px;
opacity:0.7;
text-align:center;
min-height:30px;
margin-bottom:8px;
padding:0 5px;
}

.buttons{
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:center;
margin-top:auto;
}

.profile-btn{
border:1px solid rgba(255,255,255,0.2);
padding:5px 12px;
cursor:pointer;
letter-spacing:2px;
font-size:11px;
text-transform:lowercase;
text-decoration:none;
color:white;
background: rgba(255,255,255,0.05);
backdrop-filter: blur(8px);
border-radius:8px;
transition:0.25s;
}

.profile-btn:hover{
background:white;
color:black;
}
</style>
</head>

<body>

<canvas id="snow"></canvas>

<div id="enter-screen">
  <div class="title">x_x</div>
  <div class="enter-btn" onclick="enterSite()">enter</div>
</div>

<div id="profile-screen">

<!-- PROFILES (unchanged) -->

<!-- KEEP YOUR ORIGINAL PROFILES HERE -->
<!-- (I didn’t touch your content) -->

</div>

<script>
let audioStarted = false;
let autoScroll;
let isInteracting = false;
let snapTimeout;

function enterSite(){
  const enter = document.getElementById("enter-screen");
  const profiles = document.getElementById("profile-screen");

  enter.style.opacity = "0";

  setTimeout(()=>{
    enter.style.display = "none";
    profiles.style.opacity = "1";
    profiles.style.pointerEvents = "auto";

    duplicateProfiles();
    startAutoScroll();
    updateProfiles();
  },1000);

  startMusic();
  setupHoverTyping();
}

/* LOOP DUPLICATION */
function duplicateProfiles(){
  const container = document.getElementById("profile-screen");
  const items = Array.from(container.children);

  items.forEach(el=>{
    container.appendChild(el.cloneNode(true));
  });
}

/* AUTO SCROLL */
function startAutoScroll(){
  const container = document.getElementById("profile-screen");

  autoScroll = setInterval(()=>{
    if(isInteracting) return;

    container.scrollTop += 0.35;

    if(container.scrollTop >= container.scrollHeight / 2){
      container.scrollTop = 0;
    }

    updateProfiles();
  },16);
}

/* INTERACTION */
const container = document.getElementById("profile-screen");

container.addEventListener("mouseenter", ()=> isInteracting = true);
container.addEventListener("mouseleave", ()=>{
  isInteracting = false;
  snapToClosest();
});

container.addEventListener("touchstart", ()=> isInteracting = true);
container.addEventListener("touchend", ()=>{
  isInteracting = false;
  snapToClosest();
});

/* SNAP */
function snapToClosest(){
  clearTimeout(snapTimeout);

  snapTimeout = setTimeout(()=>{
    const profiles = document.querySelectorAll(".profile");
    const center = window.innerHeight / 2;

    let closest = null;
    let minDist = Infinity;

    profiles.forEach(profile=>{
      const rect = profile.getBoundingClientRect();
      const profileCenter = rect.top + rect.height/2;
      const dist = Math.abs(center - profileCenter);

      if(dist < minDist){
        minDist = dist;
        closest = profile;
      }
    });

    if(closest){
      const offset = closest.offsetTop - (window.innerHeight/2) + (closest.offsetHeight/2);

      container.scrollTo({
        top: offset,
        behavior: "smooth"
      });
    }
  },100);
}

/* 3D + FOCUS */
function updateProfiles(){
  const profiles = document.querySelectorAll(".profile");
  const center = window.innerHeight / 2;

  profiles.forEach(profile=>{
    const rect = profile.getBoundingClientRect();
    const profileCenter = rect.top + rect.height / 2;

    const distance = center - profileCenter;
    const absDist = Math.abs(distance);

    const rotateX = distance * 0.05;

    if(absDist < 120){
      profile.style.opacity = "1";
      profile.style.transform = `scale(1) rotateX(${rotateX}deg)`;
      profile.style.filter = "blur(0px)";
      profile.style.boxShadow = "0 0 50px rgba(255,255,255,0.25)";
    }
    else if(absDist < 250){
      profile.style.opacity = "0.6";
      profile.style.transform = `scale(0.9) rotateX(${rotateX}deg)`;
      profile.style.filter = "blur(1px)";
      profile.style.boxShadow = "0 0 20px rgba(255,255,255,0.1)";
    }
    else{
      profile.style.opacity = "0.2";
      profile.style.transform = `scale(0.8) rotateX(${rotateX}deg)`;
      profile.style.filter = "blur(2px)";
      profile.style.boxShadow = "none";
    }
  });
}

container.addEventListener("scroll", ()=>{
  updateProfiles();

  clearTimeout(snapTimeout);
  snapTimeout = setTimeout(()=>{
    if(!isInteracting) snapToClosest();
  },120);
});

/* MUSIC + TYPING (UNCHANGED) */
let bgAudio;

function startMusic(){
  if(audioStarted) return;

  bgAudio = new Audio("media/song.mp3");
  bgAudio.loop = true;
  bgAudio.volume = 0.7;

  bgAudio.play().then(()=>{
    audioStarted = true;
  }).catch(()=>{
    document.addEventListener("click", () => {
      bgAudio.play();
      audioStarted = true;
    }, { once: true });
  });
}

function typeWriter(el, text, speed = 25){
  let i = 0;
  function type(){
    if(!el.isTyping) return;
    if(i < text.length){
      el.innerHTML += text.charAt(i);
      i++;
      el.typingTimeout = setTimeout(type, speed);
    }
  }
  type();
}

function setupHoverTyping(){
  document.querySelectorAll(".profile").forEach(profile => {
    const bio = profile.querySelector(".bio");
    const text = bio.dataset.bio;

    profile.addEventListener("mouseenter", () => {
      bio.innerHTML = "";
      bio.isTyping = true;
      typeWriter(bio, text);
    });

    profile.addEventListener("mouseleave", () => {
      bio.isTyping = false;
      clearTimeout(bio.typingTimeout);
      bio.innerHTML = "";
    });
  });
}

/* SNOW (UNCHANGED) */
const canvas = document.getElementById("snow");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const isMobile = window.innerWidth < 768;
const FLAKE_COUNT = isMobile ? 120 : 220;

let snowflakes = [];

function createSnowflakes(){
  snowflakes = [];
  for(let i=0;i<FLAKE_COUNT;i++){
    snowflakes.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      size: Math.random()*1.2 + 0.3,
      speedY: Math.random()*0.6 + 0.2,
      speedX: Math.random()*0.3 - 0.15,
      opacity: Math.random()*0.5 + 0.2
    });
  }
}

createSnowflakes();

function drawSnow(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let flake of snowflakes){
    ctx.beginPath();
    ctx.arc(flake.x, flake.y, flake.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${flake.opacity})`;
    ctx.fill();

    flake.y += flake.speedY;
    flake.x += flake.speedX;
    flake.x += Math.sin(flake.y * 0.01) * 0.2;

    if(flake.y > canvas.height){
      flake.y = -5;
      flake.x = Math.random()*canvas.width;
    }

    if(flake.x > canvas.width) flake.x = 0;
    if(flake.x < 0) flake.x = canvas.width;
  }

  requestAnimationFrame(drawSnow);
}

drawSnow();
</script>

</body>
</html>
