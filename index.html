<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>lurki.ng</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Rajdhani', sans-serif;
overflow:hidden;
}

#enter-screen{
text-align:center;
opacity:1;
transition:opacity 1.2s ease;
z-index:2;
}

.title{
font-size:28px;
letter-spacing:3px;
margin-bottom:25px;
}

.enter-btn{
border:1px solid white;
padding:10px 35px;
display:inline-block;
cursor:pointer;
letter-spacing:2px;
transition:0.2s;
}

.enter-btn:hover{
background:white;
color:black;
}


#gif-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
opacity:0;
transition:opacity 1.2s ease;
pointer-events:none;
}

#gif-screen img{
max-width:500px;
height:auto;
}

</style>
</head>

<body>

<div id="enter-screen">

<div class="title">lurki.ng</div>

<div class="enter-btn" onclick="enterSite()">enter</div>

</div>

<div id="gif-screen">

<img src="eye.gif">

</div>

<script>

function enterSite(){

document.getElementById("enter-screen").style.opacity = "0";

let gif = document.getElementById("gif-screen");
gif.style.pointerEvents = "auto";
gif.style.opacity = "1";

}

</script>

</body>
</html>
