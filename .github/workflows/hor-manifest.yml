name: Build HOR Manifest

on:
  push:
    paths:
      - "HOR/**"
      - "build-hor-manifest.ps1"
      - ".github/workflows/hor-manifest.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-manifest:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate HOR manifest
        shell: pwsh
        run: ./build-hor-manifest.ps1

      - name: Commit updated manifest
        shell: bash
        run: |
          if git diff --quiet -- HOR/manifest.json; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add HOR/manifest.json
          git commit -m "Update HOR manifest"
          git push
