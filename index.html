<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>x_x</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background: radial-gradient(circle at top, #0a0a0a, #000);
color:white;
min-height:100vh;
font-family:'Rajdhani', sans-serif;
overflow-x:hidden; /* FIXED */
}

/* SNOW */
#snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}

/* ENTER */
#enter-screen{
text-align:center;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
transition:opacity 1.2s ease;
z-index:3;
}

.title{
font-size:32px;
letter-spacing:6px;
margin-bottom:30px;
}

.enter-btn{
border:1px solid rgba(255,255,255,0.2);
padding:10px 28px;
cursor:pointer;
background: rgba(255,255,255,0.05);
border-radius:10px;
}

/* PROFILE SCREEN */
#profile-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

display:flex;
flex-direction:column;
align-items:center;
gap:20px;

overflow-y:auto;
padding:80px 20px;

opacity:0;
pointer-events:none;
z-index:3;

scroll-behavior:smooth;
scroll-snap-type:y mandatory;
}

/* fade */
#profile-screen::before,
#profile-screen::after{
content:"";
position:fixed;
left:0;
width:100%;
height:120px;
pointer-events:none;
z-index:5;
}
#profile-screen::before{
top:0;
background:linear-gradient(to bottom,#000,transparent);
}
#profile-screen::after{
bottom:0;
background:linear-gradient(to top,#000,transparent);
}

/* CARD */
.profile{
width:200px;
height:300px;
display:flex;
flex-direction:column;
justify-content:space-between;

background: rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.15);
border-radius:18px;
padding:18px;

transition:0.4s;
opacity:0.3;
transform:scale(0.85);
scroll-snap-align:center;
}

.profile img{
width:100px;height:100px;border-radius:50%;
margin:auto;
}

/* TEXT */
.name{text-align:center;margin-top:10px;}
.bio{text-align:center;font-size:12px;opacity:0.7;}

.buttons{display:flex;justify-content:center;gap:8px;margin-top:auto;}

.profile-btn{
border:1px solid rgba(255,255,255,0.2);
padding:5px 10px;
font-size:11px;
text-decoration:none;
color:white;
border-radius:6px;
}
</style>
</head>

<body>

<canvas id="snow"></canvas>

<div id="enter-screen">
  <div class="title">x_x</div>
  <div class="enter-btn" onclick="enterSite()">enter</div>
</div>

<div id="profile-screen">

<!-- YOUR PROFILES (unchanged) -->
<div class="profile"><div class="profile-top">
<img src="images/charlie.webp">
<div class="name">caught</div>
<div class="bio" data-bio="alicia my love"></div>
</div></div>

<div class="profile"><div class="profile-top">
<img src="images/emre.webp">
<div class="name">anemic</div>
<div class="bio" data-bio="every time we talk, think i go off script"></div>
</div></div>

<div class="profile"><div class="profile-top">
<img src="images/lana.webp">
<div class="name">lana</div>
<div class="bio" data-bio="i'll beat ur nan to death fam"></div>
</div></div>

</div>

<script>
let audioStarted=false;
let autoScroll;
let isInteracting=false;
let snapTimeout;

function getContainer(){
  return document.getElementById("profile-screen");
}

function enterSite(){
  const enter=document.getElementById("enter-screen");
  const profiles=getContainer();

  enter.style.opacity="0";

  setTimeout(()=>{
    enter.style.display="none";
    profiles.style.opacity="1";
    profiles.style.pointerEvents="auto";

    duplicateProfiles();
    startAutoScroll();
    updateProfiles();
  },1000);
}

/* LOOP */
function duplicateProfiles(){
  const c=getContainer();
  [...c.children].forEach(el=>{
    c.appendChild(el.cloneNode(true));
  });
}

/* AUTO SCROLL */
function startAutoScroll(){
  const c=getContainer();

  autoScroll=setInterval(()=>{
    if(isInteracting) return;

    c.scrollTop+=0.4;

    if(c.scrollTop>=c.scrollHeight/2){
      c.scrollTop=0;
    }

    updateProfiles();
  },16);
}

/* INTERACTION */
document.addEventListener("mousemove",()=>isInteracting=true);
document.addEventListener("mouseleave",()=>{isInteracting=false;snapToClosest();});

/* SNAP */
function snapToClosest(){
  clearTimeout(snapTimeout);

  snapTimeout=setTimeout(()=>{
    const c=getContainer();
    const profiles=document.querySelectorAll(".profile");
    const center=window.innerHeight/2;

    let closest=null,min=Infinity;

    profiles.forEach(p=>{
      const rect=p.getBoundingClientRect();
      const dist=Math.abs(center-(rect.top+rect.height/2));
      if(dist<min){min=dist;closest=p;}
    });

    if(closest){
      c.scrollTo({
        top:closest.offsetTop-(window.innerHeight/2)+(closest.offsetHeight/2),
        behavior:"smooth"
      });
    }
  },100);
}

/* EFFECT */
function updateProfiles(){
  const profiles=document.querySelectorAll(".profile");
  const center=window.innerHeight/2;

  profiles.forEach(p=>{
    const rect=p.getBoundingClientRect();
    const dist=center-(rect.top+rect.height/2);
    const abs=Math.abs(dist);

    const rotate=dist*0.05;

    if(abs<120){
      p.style.opacity="1";
      p.style.transform=`scale(1) rotateX(${rotate}deg)`;
      p.style.boxShadow="0 0 40px rgba(255,255,255,0.25)";
    }else if(abs<250){
      p.style.opacity="0.6";
      p.style.transform=`scale(0.9) rotateX(${rotate}deg)`;
    }else{
      p.style.opacity="0.2";
      p.style.transform=`scale(0.8) rotateX(${rotate}deg)`;
    }
  });
}

getContainer().addEventListener("scroll",()=>{
  updateProfiles();
  clearTimeout(snapTimeout);
  snapTimeout=setTimeout(()=>{if(!isInteracting)snapToClosest();},120);
});

window.addEventListener("load",updateProfiles);

/* SNOW (same) */
const canvas=document.getElementById("snow");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let snowflakes=[];
for(let i=0;i<150;i++){
snowflakes.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*1.2,
speedY:Math.random()*0.6
});
}

function drawSnow(){
ctx.clearRect(0,0,canvas.width,canvas.height);
snowflakes.forEach(f=>{
ctx.beginPath();
ctx.arc(f.x,f.y,f.size,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();
f.y+=f.speedY;
if(f.y>canvas.height){f.y=0;}
});
requestAnimationFrame(drawSnow);
}
drawSnow();
</script>

</body>
</html>
