<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lurki.ng | Upload Images 4 Free</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <div class="orb orb-left"></div>
    <div class="orb orb-right"></div>

    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <span class="brand-name">lurki.ng</span>
      </div>
    </header>

    <main class="hero-grid">
      <section class="upload-panel" id="upload-panel">
        <div class="panel-header">
          <span class="status-pill" id="statusPill">Ready</span>
        </div>

        <label class="dropzone" id="dropzone" for="imageInput">
          <input id="imageInput" type="file" accept="image/*">
          <div class="dropzone-content">
            <span class="dropzone-icon">+</span>
            <strong>Drop an image here</strong>
            <p>or tap to choose a file from your device</p>
          </div>
        </label>

        <div class="duration-picker" role="group" aria-label="Select active duration">
          <span class="duration-label">Active for</span>
          <div class="duration-options">
            <button class="duration-option is-selected" type="button" data-duration-hours="3">3h</button>
            <button class="duration-option" type="button" data-duration-hours="24">24h</button>
            <button class="duration-option" type="button" data-duration-hours="48">48h</button>
          </div>
        </div>

        <section class="preview-card">
          <div class="preview-frame">
            <img id="previewImage" alt="Selected preview">
            <div class="preview-placeholder" id="previewPlaceholder">
              <span>Image preview will appear here</span>
            </div>
          </div>

          <div class="preview-meta">
            <div class="meta-row">
              <span>File Link</span>
              <div class="meta-link-group">
                <strong id="fileName">No link yet</strong>
                <button id="copyButton" class="mini-copy-button" type="button">Copy</button>
              </div>
            </div>
            <div class="meta-row">
              <span>Size</span>
              <strong id="fileSize">0 MB</strong>
            </div>
            <div class="meta-row">
              <span>Expires In</span>
              <strong id="expiryTimer">--:--:--</strong>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
